[package]
name = "openrr-nav-viewer"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
arci = "0.1"
bevy = "0.10"
bevy_egui = "0.20"
egui = "0.20"
nalgebra = "0.30"
parking_lot = "0.12"
grid_map = { path = "../grid_map" }
openrr-nav = { path = "../openrr-nav" }

[dev-dependencies]
arci-ros = "0.1"
arci-urdf-viz = "0.1"
tokio = "1"
rand = "0.8"
rrt = "0.7"

[patch.crates-io]
arci = { git = "https://github.com/openrr/openrr" }
arci-ros = { git = "https://github.com/openrr/openrr" }
arci-urdf-viz = { git = "https://github.com/openrr/openrr" }
